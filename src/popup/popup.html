<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        </svg>
      </div>
      <div>
        <h1>Pixel Lens</h1>
        <p class="subtitle">Spacing & alignment inspector</p>
      </div>
    </div>

    <button id="toggle-btn" class="toggle-btn">
      <span class="status-dot"></span>
      <span class="btn-label">Enable</span>
    </button>

    <div class="shortcuts">
      <div class="shortcut-row">
        <span class="shortcut-action">Toggle</span>
        <span class="shortcut-keys"><kbd>Alt</kbd><kbd>Shift</kbd><kbd>P</kbd></span>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-action">Deselect</span>
        <span class="shortcut-keys"><kbd>Esc</kbd></span>
      </div>
    </div>

    <p class="hint">Click to select. Hover to measure.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
