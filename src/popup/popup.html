<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1.5" y="1.5" width="6" height="6" rx="1" stroke="var(--text-secondary)" stroke-width="1.2" fill="none"/>
          <rect x="10.5" y="10.5" width="6" height="6" rx="1" stroke="var(--text-secondary)" stroke-width="1.2" fill="none" stroke-dasharray="2.5 1.5"/>
          <line x1="8" y1="4.5" x2="10.5" y2="4.5" stroke="var(--color-emfas-red)" stroke-width="0.8" stroke-dasharray="1.5 1"/>
          <line x1="4.5" y1="8" x2="4.5" y2="10.5" stroke="var(--color-emfas-red)" stroke-width="0.8" stroke-dasharray="1.5 1"/>
        </svg>
      </div>
      <div>
        <h1>Pixel Lens</h1>
        <p class="subtitle">Spacing & alignment inspector</p>
      </div>
    </div>

    <button id="toggle-btn" class="toggle-btn">
      <span class="status-dot"></span>
      <span class="btn-label">Enable</span>
    </button>

    <div class="shortcuts">
      <div class="shortcut-row">
        <span class="shortcut-action">Toggle</span>
        <span class="shortcut-keys"><kbd>Alt</kbd><kbd>Shift</kbd><kbd>P</kbd></span>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-action">Deselect</span>
        <span class="shortcut-keys"><kbd>Esc</kbd></span>
      </div>
    </div>

    <p class="hint">Click to select. Hover to measure.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
